<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#080b12" />
  <title>期末刷題網站</title>
  <link rel="stylesheet" href="style.css?v=dark189fix-20260623" />
</head>
<body>
  <main class="app">
    <section id="homePage" class="page-card">
      <div class="doc-title">
        <p>資料結構與演算法題庫</p>
        <h1>期末刷題網站</h1>
        <span id="bankInfo">手機可用｜載入中...</span>
      </div>

      <div class="stats-grid">
        <div>
          <strong id="totalCount">0</strong>
          <span>總題數</span>
        </div>
        <div>
          <strong id="wrongCount">0</strong>
          <span>錯題數</span>
        </div>
      </div>

      <div class="menu">
        <button id="startAllBtn" class="primary">全部題目</button>
        <button id="startRandomBtn">隨機練習</button>
        <button id="startWrongBtn">錯題練習</button>
        <button id="toggleAnswerBtn" class="ghost">顯示答案串</button>
        <button id="clearWrongBtn" class="danger ghost">清空錯題本</button>
      </div>

      <div id="answerBox" class="answer-box hidden">
        <span>答案連續串</span>
        <strong id="answerStringText"></strong>
      </div>

      <p class="hint">考前策略：先刷全部題目，再把錯題練到連續答對。不要只背答案串。</p>
      <p id="versionText" class="version-text"></p>
    </section>

    <section id="quizPage" class="page-card hidden">
      <div class="topbar">
        <button id="backHomeBtn" class="small ghost">回首頁</button>
        <span id="modeLabel">練習模式</span>
      </div>

      <div class="progress-wrap">
        <div class="progress-info">
          <span id="questionProgress">第 1 / 1 題</span>
          <span id="scoreText">答對 0 題</span>
        </div>
        <div class="progress-bar">
          <div id="progressFill"></div>
        </div>
      </div>

      <article class="question-card">
        <h2 id="questionText"></h2>
        <div id="imageBox" class="image-box hidden"></div>
        <div id="optionsBox" class="options"></div>
      </article>

      <section id="feedbackBox" class="feedback hidden">
        <h3 id="feedbackTitle"></h3>
        <p id="answerLine"></p>
        <p id="explanationText"></p>
      </section>

      <div class="actions">
        <button id="prevBtn" class="ghost">上一題</button>
        <button id="nextBtn" class="primary">下一題</button>
      </div>
    </section>

    <section id="resultPage" class="page-card hidden">
      <h1>練習完成</h1>
      <div class="result-score">
        <strong id="finalScore">0%</strong>
        <span id="finalDetail">答對 0 / 0 題</span>
      </div>
      <div class="menu">
        <button id="reviewWrongBtn" class="primary">練習錯題</button>
        <button id="restartBtn">重新練習</button>
        <button id="resultHomeBtn" class="ghost">回首頁</button>
      </div>
    </section>
  </main>

  <script src="questions.js?v=dark189fix-20260623"></script>
  <script src="script.js?v=dark189fix-20260623"></script>
</body>
</html>
